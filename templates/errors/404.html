{% extends "base.html" %}

{% block title %}Página no encontrada - 404{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-1 fw-bold text-secondary">404</h1>
            <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
            <h2 class="mt-3">¡Vaya! Parece que te has perdido</h2>
            <p class="lead text-muted">La página que buscas no existe o ha sido movida a otro concesionario.</p>
            <hr>
            <a href="{{ url_for('vehiculos.index') }}" class="btn btn-primary btn-lg shadow-sm">
                <i class="bi bi-house-door-fill me-2"></i>Volver al menú principal
            </a>
        </div>
    </div>
</div>
{% endblock %}
